---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-portal-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform-portal
  template:
    metadata:
      labels:
        app: platform-portal
    spec:
      containers:
        - name: platform-portal
          image: ghcr.io/abhishekchaturvedi07/platform-portal-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            # 👉 K8s internal DNS resolution!
            - name: REDIS_URL
              value: "redis://redis-cache-service:6379"
            - name: IDENTITY_SERVICE_URL
              value: "identity-service:50051"
            - name: AI_ENGINE_URL
              value: "http://ai-engine-service:8000"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@message-broker-service:5672"
---
apiVersion: v1
kind: Service
metadata:
  name: platform-portal-service
spec:
  type: LoadBalancer # Exposes the UI to the public internet!
  selector:
    app: platform-portal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
